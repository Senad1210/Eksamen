<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montana</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>
<body>

<header class="top-bar">
  <div class="top-bar-inner">
    <a class="logo" href="/">MONTANA</a>
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Søk etter produkter" autocomplete="off" />
      <button id="searchBtn">Søk</button>
    </div>
    <div class="top-icons">
      <button class="icon-btn" id="userBtn">Konto</button>
      <button class="icon-btn" id="cartBtn">
        Handlekurv
        <span class="cart-badge hidden" id="cartBadge">0</span>
      </button>
    </div>
  </div>
</header>

<main class="page">
  <div id="noResults" class="no-results hidden">Ingen produkter funnet.</div>
  <div class="grid" id="productGrid">
    {% for p in products %}
    <div class="card"
         data-id="{{ p.id }}"
         data-name="{{ p.name }}"
         data-price="{{ p.price }}"
         data-stock="{{ p.stock }}"
         data-image="{{ p.image }}">
      <div class="card-img">
        <img src="{{ url_for('static', filename='images/' ~ p.image) }}"
             alt="{{ p.name }}"
             loading="lazy">
      </div>
      <div class="card-body">
        <h3>{{ p.name }}</h3>
        <p class="card-desc">{{ p.description }}</p>
        <div class="card-row">
          <span class="price">{{ p.price | int }} kr</span>
          <span class="stock-tag
            {% if p.stock == 0 %}out
            {% elif p.stock <= 4 %}low
            {% endif %}">
            {% if p.stock == 0 %}Utsolgt
            {% elif p.stock <= 4 %}Få igjen
            {% else %}På lager
            {% endif %}
          </span>
        </div>
        <button class="add-btn"
                onclick="addToCart(this)"                 # when clicked, runs JS function and passes this button           
                {% if p.stock == 0 %}disabled{% endif %}> <!-- disables button if no stock -->
          {% if p.stock == 0 %}Utsolgt{% else %}Legg i kurv{% endif %}
        </button>
      </div>
    </div>
    {% endfor %}
  </div>
</main>

<div class="drawer-overlay" id="drawerOverlay"></div>



<aside class="side-drawer" id="userDrawer">
  <div class="drawer-header">
    <h2>Konto</h2>
    <button onclick="closeUser()">✕</button>
  </div>

  <!-- Login/Register section -->
  <div id="authPanel">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Logg inn</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrer</button>
    </div>

     <!-- Tabs to switch between login and register -->
    <div id="loginForm" class="auth-form">
      <label>E-post</label>
      <input type="email" id="loginEmail" placeholder="din@epost.no" />
      <label>Passord</label>
      <input type="password" id="loginPass" placeholder="Passord" />
      <p class="auth-error hidden" id="loginError"></p>
      <button class="auth-submit" onclick="doLogin()">Logg inn</button>
    </div>

    <div id="registerForm" class="auth-form hidden">
      <label>Navn</label>
      <input type="text" id="regName" placeholder="Fullt navn" />
      <label>E-post</label>
      <input type="email" id="regEmail" placeholder="din@epost.no" />
      <label>Passord</label>
      <input type="password" id="regPass" placeholder="Minst 6 tegn" />
      <p class="auth-error hidden" id="registerError"></p>
      <button class="auth-submit" onclick="doRegister()">Opprett konto</button>
    </div>
  </div>

  <div id="profilePanel" class="hidden">
    <div style="padding: 20px;">
      <p id="profileName"></p>
      <button class="logout-btn" onclick="doLogout()">Logg ut</button>
    </div>
  </div>
</aside>





<aside class="side-drawer" id="cartDrawer">
  <div class="drawer-header">
    <h2>Handlekurv</h2>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <p class="empty-msg">Kurven er tom.</p>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      Total: <strong id="cartTotal">0 kr</strong>
    </div>
    <button class="checkout-btn" onclick="doCheckout()">Gå til kasse</button>
  </div>
</aside>







<script>
  window.LOGGED_IN = {{ 'true' if user else 'false' }};
  window.USER_NAME = {{ ('"' ~ user.name ~ '"') | safe if user else 'null' }};
</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
